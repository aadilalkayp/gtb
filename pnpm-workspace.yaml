packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
  zenstack: true


# Dependencies allowed to run install/build scripts. pnpm 11 replaced the old
# `onlyBuiltDependencies` list (and the package.json "pnpm" field) with this
# `allowBuilds` name -> bool map. `pnpm approve-builds --all` rewrites this block.
allowBuilds:
  esbuild: true
  prisma: true
  "@prisma/client": true
  "@prisma/engines": true
  zenstack: true
  sharp: true
  unrs-resolver: true
